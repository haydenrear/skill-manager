# skill-manager metadata for hello-skill. Invisible to the agent runtime;
# tooling-only. Top-level arrays come first — anything after a [table]
# header belongs to that table.

# Transitive skill deps. Prefixes:
#   skill:<name>[@<version>]   registry lookup
#   file:<path>                sub-skill bundled in this directory (resolved
#                              relative to this skill's directory)
skill_references = []

# CLI tools the skill needs on PATH. `spec` selects the installer backend:
#   pip:<pkg>[==ver]    platform-independent (bundled uv)
#   npm:<pkg>[@ver]     platform-independent (bundled node/npm)
#   brew:<pkg>          macOS/Linux (Homebrew; symlinked into bin/cli)
#   tar:<name>          download+extract using the install targets below

[[cli_dependencies]]
spec = "pip:ruff==0.6.9"
on_path = "ruff"

[[cli_dependencies]]
spec = "tar:rg"
name = "rg"
on_path = "rg"
min_version = "14.0.0"

[cli_dependencies.install.darwin-arm64]
url = "https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-aarch64-apple-darwin.tar.gz"
archive = "tar.gz"
binary = "ripgrep-14.1.1-aarch64-apple-darwin/rg"

[cli_dependencies.install.linux-x64]
url = "https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep-14.1.1-x86_64-unknown-linux-musl.tar.gz"
archive = "tar.gz"
binary = "ripgrep-14.1.1-x86_64-unknown-linux-musl/rg"

# MCP servers the skill needs. skill-manager registers each with the gateway;
# agents only ever see the gateway itself.

# Each entry is self-contained. Use inline tables (`load = { ... }` and
# `init_schema = [ ... ]`) so each mcp_dependency's fields are visibly grouped.
# Adding a second dependency is just another [[mcp_dependencies]] block.
#
# default_scope — how agents deploy this server. One of:
#   session        — fresh deployment per agent session; init values ephemeral
#   global         — shared across sessions; last init sticks for the process lifetime
#   global-sticky  — shared across sessions; last init persists to disk and is
#                    auto-redeployed when the gateway restarts (default)

[[mcp_dependencies]]
name = "sequential-thinking"
display_name = "Sequential Thinking"
description = "Structured step-by-step reasoning tool — public Anthropic MCP reference server."
default_scope = "global-sticky"
# Public stdio MCP server, anonymous-pull-friendly on Docker Hub.
# (Previously referenced ghcr.io/cognition-ai/deepwiki-mcp:latest, which
# isn't a published image — anonymous pulls 403'd and install rolled
# the MCP registration to MCP_REGISTRATION_FAILED.)
load = { type = "docker", image = "mcp/sequentialthinking:latest" }

# skill-wide metadata (kept last because [skill] steals any trailing keys)
[skill]
name = "hello-skill"
version = "0.1.0"
