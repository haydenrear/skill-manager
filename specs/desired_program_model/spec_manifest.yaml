case_codegen:
  style: explicit_transition_cases
  generation_status: planned

state_fields:
  - name: cli_tool_records
    tla: cli_tool_records
    desired_change: Tracks managed CLI artifacts for package and skill-script CLI deps.
  - name: cli_cli_lock
    tla: cli_cli_lock
    desired_change: Tracks lock rows for package and skill-script CLI deps.
  - name: cli_skill_scripts_run
    tla: cli_skill_scripts_run
    desired_change: Represents active skill-script CLI artifacts that have run for still-claimed scripts.
  - name: CliDepsFor
    tla: CliDepsFor(units)
    desired_change: Derived ownership set equal to PackagesFor(units) union ScriptsFor(units).

commands:
  InstallUnitForceScripts:
    action: InstallUnitForceScripts
    fields:
      unit_id:
        type: UnitId
        tla: u
    acceptance:
      - Bypasses the fingerprint/binary-present skip for skill-script deps.
      - Preserves the same resolve and policy-gate ordering as normal install.
  SyncUnitForceScripts:
    action: SyncUnitForceScripts
    fields:
      unit_id:
        type: UnitId
        tla: u
    acceptance:
      - Bypasses the fingerprint/binary-present skip for skill-script deps.
      - Preserves the same sync target validation and policy-gate ordering as normal sync.
  RemoveUnit:
    action: RemoveUnit
    desired_change:
      - Removes orphaned CliDepsFor({u}) entries from cli_tool_records and cli_cli_lock.
      - Keeps CLI artifacts and lock rows still claimed by remaining installed units.
      - Treats plugin-level metadata plus contained skills as the effective unit dependency claim.

ports:
  SkillManagerCli:
    added_methods:
      install_unit_force_scripts: {command: InstallUnitForceScripts, result: InstallResult}
      sync_unit_force_scripts: {command: SyncUnitForceScripts, result: SyncResult}
    refined_methods:
      remove_unit: {command: RemoveUnit, result: RemoveResult}

invariants:
  - CliCliLockTracksInstalledPackages
  - CliCliArtifactsAreClaimed
  - CliCliLockRowsAreClaimed
  - SkillScriptsAreKnownScripts
  - SkillScriptRunsAreClaimed

adapter_expectations:
  - label: InstallUnitForceScripts
    adapter: specs.current.production_adapters:InstallUnitAdapter
    status: pending
    evidence: install --force-scripts reruns a matching-fingerprint skill-script dep.
  - label: SyncUnitForceScripts
    adapter: specs.current.production_adapters:SyncUnitAdapter
    status: pending
    evidence: sync --force-scripts reruns a matching-fingerprint skill-script dep.
  - label: RemoveUnit
    adapter: specs.current.production_adapters:RemoveUnitAdapter
    status: pending
    evidence: uninstall prunes orphaned cli-lock rows and bin/cli artifacts while preserving shared claims.

notes:
  baseline_comparison: >
    The accepted program model already has CLI package records, cli-lock rows,
    skill-script execution records, and MCP orphan cleanup. ISSUE-91 extends
    that same semantic boundary by making skill-script rerun force explicit and
    by adding CLI dependency orphan cleanup to RemoveUnit.
  policy_rule: >
    Force-scripts changes rerun eligibility only. Production implementation
    must still build the install plan, expose DANGER severity for skill-script
    backends, and run the existing policy.install gate before executing scripts.
