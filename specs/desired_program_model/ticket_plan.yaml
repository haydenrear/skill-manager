service_catalog:
  existing_boundaries:
    - skill install/sync/remove into SKILL_MANAGER_HOME
    - transitive skill references
    - CLI tool lock and install records
    - MCP gateway catalog and dynamic server registration
    - doc-repo binding and managed-copy/import projection
    - harness template sync
    - per-agent projection rows
  desired_boundaries:
    - skill-manager-project.toml project manifest registration
    - project dependency resolution into SKILL_MANAGER_HOME
    - project lock and home registration for future sync/upgrade/rebind
    - project-local agent config projection for CLAUDE.md and AGENTS.md
    - generated project-local .skill-manager/bin shims
    - generated project-local uv envs under .skill-manager/envs/<env>
    - project-relative skill package vendor paths under .skill-manager/vendor
    - generated .skill-manager/env.md as documentation, not source of truth
    - libs/ source checkout resolution with locked git provenance
    - harness-derived child Skill Manager homes
    - skill-manager-project.toml manifests as project harnesses
    - project .skill-manager directories as parent-aware child Skill Manager homes
    - recursive child-home awareness where any Skill Manager home may parent another home
    - child .skill-manager, .codex, .claude, .gemini roots and env variables
  adapter_boundaries:
    - project manifest parser and resolver
    - project lock writer and project registry writer
    - bind/doc projection adapter for project roots
    - uv env renderer/sync runner
    - libs git resolver
    - child-home harness instantiator
    - project child-home scaffolder
  known_gaps:
    - Exact CLI command names are not final.
    - Env cache keying by dependency spec, project, or lock hash is still open.
    - Upgrade behavior for active project bindings needs adapter coverage.

tickets:
  - id: ISSUE-75-1
    title: Project manifest schema and registration
    status: next
    depends_on: []
    objective: >
      Define skill-manager-project.toml as the project-scoped source of truth
      for skills, plugins, harnesses, doc repos, CLI dependencies, MCP
      dependencies, envs, libs, and agent projection metadata.
    desired_actions:
      - RegisterProjectManifest
    current_increment:
      model_state:
        - project_model.manifests
        - project_model.env_specs
        - project_model.lib_specs
      model_actions:
        - RegisterProjectManifest
      adapters:
        - ProjectManifestAdapter
      unit_tests:
        - parse project manifest with skills/plugins/harness/doc/env/lib sections
        - reject unknown or malformed project references
      graph_after_unit_pass:
        - python skills/test_graph/scripts/run.py smoke
        - python skills/test_graph/scripts/run.py onboard
      acceptance:
        commands:
          - bash specs/current/run_tlc.sh specs/current/SkillManager.tla specs/current/MC.cfg
          - python skills/test_graph/scripts/run.py smoke
          - python skills/test_graph/scripts/run.py onboard
        assertions:
          - Project manifests are registered without installing or materializing dependencies.
          - Env and lib intent is recorded as portable project intent.
          - Existing install, registry, gateway, and onboarding flows still pass externally.
      evidence: []

