    title: "Stale TRANSITIVE_RESOLVE_FAILED error never clears after the offending reference is removed"
    status: next
    depends_on: []
    objective: "Describe the behavior change in program terms. Name the resource or state boundary that must become true, not only the implementation file."
    desired_actions:
      # Add TLA+ action names that will exist in specs/desired_program_model.
