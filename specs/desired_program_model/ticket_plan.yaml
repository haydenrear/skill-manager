  - id: ISSUE-75-6
    title: Scaffold project .skill-manager as a child home
    status: pending
    depends_on: [ISSUE-75-2, ISSUE-75-3]
    objective: >
      Treat a skill-manager-project.toml checkout as the harness for that
      project. When the project is resolved, scaffold the project-local
      .skill-manager as a child Skill Manager home, create .codex, .claude,
      and .gemini agent roots, point agent home variables at the child, and
      register the parent-child relationship with the parent Skill Manager
      home. Parent awareness must be recursive: any Skill Manager home can
      have children; the model does not depend on a distinguished global root.
    desired_actions:
      - ScaffoldProjectChildHome
    current_increment:
      model_state:
        - project_model.project_child_homes
        - project_model.child_home_parents
        - project_model.child_homes
        - project_model.child_home_agent_configs
        - project_model.child_home_units
        - project_model.child_home_mcp_servers
        - project_model.child_home_tool_shims
      model_actions:
        - ScaffoldProjectChildHome
      adapters:
        - ProjectChildHomeScaffolderAdapter
      unit_tests:
        - project manifest resolution creates or updates child .skill-manager
        - child .skill-manager is registered under the parent home
        - child .codex, .claude, and .gemini homes are scaffolded
        - CODEX_HOME, CLAUDE_HOME, GEMINI_HOME, and SKILL_MANAGER_HOME point at child paths for launched agents
        - parent-child records allow a child home to become a parent for another child
      graph_after_unit_pass:
        - python skills/test_graph/scripts/run.py onboard
        - python skills/test_graph/scripts/run.py harness-smoke
        - python skills/test_graph/scripts/run.py smoke
      acceptance:
        commands:
          - bash specs/current/run_tlc.sh specs/current/SkillManager.tla specs/current/MC.cfg
          - python skills/test_graph/scripts/run.py onboard
          - python skills/test_graph/scripts/run.py harness-smoke
          - python skills/test_graph/scripts/run.py smoke
        assertions:
          - Project child homes are registered projects with parent-aware child-home records.
          - Every child home has a known non-self parent home.
          - Project child-home units come from the project resolved unit graph.
          - External onboarding, harness, install, agent config, CLI, and MCP flows still pass.
      evidence: []

  - id: ISSUE-75-7
    title: Teach skill-manager-skill about projects and child homes
    status: pending
