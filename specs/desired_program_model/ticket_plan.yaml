  - id: ISSUE-75-3
    title: Materialize project-local tools and uv envs
    status: pending
    depends_on: [ISSUE-75-2]
    objective: >
      Make uv environments first-class project realization artifacts. Projects
      inherit recipes and skill-provided packages, not shared venvs, and Skill
      Manager renders .skill-manager/envs/<env>/pyproject.toml, uv.lock,
      .venv, .skill-manager/bin shims, .skill-manager/vendor, and env.md.
    desired_actions:
      - MaterializeProjectEnv
    current_increment:
      model_state:
        - project_model.env_realizations
        - project_model.env_locks
        - project_model.tool_shims
        - project_model.skill_vendors
        - project_model.env_docs
      model_actions:
        - MaterializeProjectEnv
      adapters:
        - ProjectEnvMaterializerAdapter
      unit_tests:
        - generated pyproject uses project-relative vendor paths
        - generated env.md is documentation only
        - sm env sync runs uv against .skill-manager/envs/<env>
        - sm env run executes through the generated uv project
      graph_after_unit_pass:
        - python skills/test_graph/scripts/run.py smoke
        - python skills/test_graph/scripts/run.py skill-dev-smoke
      acceptance:
        commands:
          - bash specs/current/run_tlc.sh specs/current/SkillManager.tla specs/current/MC.cfg
          - python skills/test_graph/scripts/run.py smoke
          - python skills/test_graph/scripts/run.py skill-dev-smoke
        assertions:
          - Env realizations always have locks.
          - Env docs only exist for realized envs.
          - Importable packages are vendored/project-local, not inherited from a shared home venv.
          - External CLI, MCP, and skill-dev flows still work with the project env layer present.
      evidence: []

