    - Run the affected test_graph graph for each landed slice, and run all graphs before promotion.

source_model:
  program_model_manifest: ../program_model/spec_manifest.yaml
  program_model_module: ../program_model/SkillManager.tla
  desired_ticket_plan: ../desired_program_model/ticket_plan.yaml

case_codegen:
  style: explicit_transition_cases
  generation_status: planned

state_fields:
  - project_model.manifests
  - project_model.registrations
  - project_model.locks
  - project_model.resolved_units
  - project_model.doc_bindings
  - project_model.harness_bindings
  - project_model.agent_configs
  - project_model.env_realizations
  - project_model.env_locks
  - project_model.tool_shims
  - project_model.skill_vendors
  - project_model.env_docs
  - project_model.env_specs
  - project_model.lib_specs
  - project_model.lib_checkouts
  - project_model.lib_locks
  - project_model.child_homes
  - project_model.project_child_homes
  - project_model.child_home_parents
  - project_model.child_home_harnesses
  - project_model.child_home_agent_configs
  - project_model.child_home_units
  - project_model.child_home_mcp_servers
  - project_model.child_home_tool_shims
actions:
  - RegisterProjectManifest
  - ResolveProjectDependencies
  - MaterializeProjectEnv
  - ResolveProjectLibs
  - InstantiateChildHomeFromHarness
  - ScaffoldProjectChildHome
ports:
  SkillManagerCli.register_project_manifest:
    adapter: ProjectManifestAdapter
    implemented_by:
      - dev.skillmanager.commands.ProjectCommand.RegisterCmd
      - dev.skillmanager.model.SkillProjectParser
      - dev.skillmanager.project.SkillProjectRegistry
  SkillManagerCli.resolve_project_dependencies:
    adapter: ProjectDependencyResolverAdapter
    implemented_by:
      - dev.skillmanager.commands.ProjectCommand.ResolveCmd
      - dev.skillmanager.project.ProjectDependencyResolver
      - dev.skillmanager.project.SkillProjectLockStore
  SkillManagerCli.materialize_project_env:
    adapter: ProjectEnvMaterializerAdapter
    implemented_by:
      - dev.skillmanager.commands.EnvCommand.Sync
      - dev.skillmanager.commands.EnvCommand.Run
      - dev.skillmanager.project.ProjectEnvMaterializer
      - dev.skillmanager.project.SkillProjectLockStore
  SkillManagerCli.resolve_project_libs:
    adapter: ProjectLibResolverAdapter
    implemented_by:
      - dev.skillmanager.commands.ProjectCommand.ResolveCmd
      - dev.skillmanager.project.ProjectLibResolver
      - dev.skillmanager.project.SkillProjectLockStore
  SkillManagerCli.instantiate_child_home_from_harness:
    adapter: ChildHomeHarnessAdapter
    implemented_by:
      - dev.skillmanager.commands.HarnessCommand.InstantiateCmd
      - dev.skillmanager.bindings.ChildHomeHarnessInstaller
      - dev.skillmanager.bindings.HarnessInstantiator
      - dev.skillmanager.bindings.HarnessInstanceLock
  SkillManagerCli.scaffold_project_child_home:
    adapter: ProjectChildHomeScaffolderAdapter
    implemented_by:
      - dev.skillmanager.commands.ProjectCommand.ResolveCmd
      - dev.skillmanager.project.ProjectDependencyResolver
      - dev.skillmanager.project.ProjectChildHomeScaffolder
      - dev.skillmanager.bindings.ChildHomeRegistry
  SkillManagerSkill.agent_docs:
    adapter: SkillManagerSkillDocsAdapter
    implemented_by:
      - skill-manager-skill/SKILL.md
      - skill-manager-skill/references/projects.md
      - skill-manager-skill/references/workflows.md
      - skill-manager-skill/references/cli.md
      - skill-manager-skill/skill-manager.toml
  SkillManagerSkill.env_helper:
    adapter: SkillManagerEnvHelperAdapter
    implemented_by:
      - skill-manager-skill/scripts/env.py
      - skill-manager-skill/scripts/env.sh
adapters: case_adapters.toml
notes:
  package_from_program_model: skillmanager_program_cases
