# External (Test Graph) action bindings for the skill-manager program model.
# TLA+ External.tla is the source of truth; every public action binds the
# real-CLI command adapter plus the projected-state assertion trio.
actions:
  SubmitInstallUnit:
    view: external
    layer: external
    controllability: e2e_direct
    kind: skill-manager-cli
    adapter: adapters:SkillManagerCliCommandAdapter
