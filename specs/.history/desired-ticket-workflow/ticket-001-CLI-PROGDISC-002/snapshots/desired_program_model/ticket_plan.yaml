# This file is part of the desired program model.
# It is intentionally general: use it for any model-backed ticket workflow,
# not only migrations. Keep it synchronized with spec_manifest.yaml status.
version: 1
name: desired-ticket-workflow
updated: 2026-06-28
purpose: >
  Rework the skill-manager CLI and bundled skills around progressive
  disclosure: every command and workflow is modeled, help is self-documenting,
  skill-manager-skill / skill-publisher-skill / skill-dev-skill stay
  consistent with the CLI, and the CLI can emit agent-facing context as
  workflows are used.

planning_rules:
  current_model_rule: Update specs/current after each production slice lands as a whole-program working copy of specs/program_model, not a ticket projection.
  unit_validation_rule: Run current-model TLC and adapter/unit tests before adding graph execution.
  graph_rule: Add graph or integration nodes only after current-model validation passes.
  semantic_model_rule: Do not add test graph nodes, pytest jobs, CI workflow steps, integration harnesses, or validation scripts as TLA+ program state/actions.
  evidence_rule: Record tests and graph runs as evidence for semantic program actions in manifests or ticket status.
  desired_sync_rule: Update this file and spec_manifest.yaml whenever scope, order, acceptance checks, or status changes.
  promotion_rule: When specs/current equals specs/desired_program_model, promote the converged model to specs/program_model.
  tlc_budget_rule: Ticket-loop TLC checks must use a bounded config that completes in two minutes or less; full whole-program TLC is promotion-level evidence only.

status:
  workflow: ticket
  active_ticket: CLI-PROGDISC-003
  active_ticket_title: "Progressive help renderer"
  desired_module: SkillManager
  phase: help_renderer

# Replace or extend these sections with project-specific domains. Service,
# process, queue, database, file, API, model, permission, or UI boundaries can
# all be listed here when they matter to correctness.
service_catalog:
  existing_boundaries:
    - picocli command annotations under src/main/java/dev/skillmanager/cli and src/main/java/dev/skillmanager/commands.
    - Bundle skill documentation under skill-manager-skill, skill-publisher-skill, and skill-dev-skill.
    - Accepted whole-program model in specs/program_model.
  desired_boundaries:
    - A canonical CLI command/workflow catalog exists in the desired model and production CLI.
    - Root help exposes top-level commands and discovery routes only.
    - Command help exposes workflow-specific usage, options, examples, related docs, and agent context hooks.
    - Bundled skills document every modeled workflow that applies to their audience.
    - CLI workflow execution can emit concise agent-facing context for follow-up use.
  adapter_boundaries:
    - CLI metadata adapter that extracts command paths, aliases, workflows, and docs links from production code.
    - Help adapter that validates root help stays shallow and command help is complete.
    - Skill-doc adapter that validates bundled skill docs cover modeled workflows.
    - Agent-context adapter that validates context output is available for modeled workflows.
  known_gaps:
    - Several subcommands currently reject `--help` but still print usage through picocli error handling.
    - Root and major command descriptions contain deep workflow prose that should move behind command-specific help.
    - There is no single source of truth connecting CLI commands, workflows, and bundled skill documentation.
    - Agent-facing context is implicit in human output rather than a modeled, inspectable surface.

