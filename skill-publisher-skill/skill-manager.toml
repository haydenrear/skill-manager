# Tooling metadata for the skill-publisher skill. The skill is pure
# documentation — it explains how to author SKILL.md + skill-manager.toml
# and run the publish/install round-trip — so it has no CLI deps and no
# MCP deps. The empty arrays keep the install plan boring when this skill
# is added.

skill_references = [
]

[skill]
name = "skill-publisher"
version = "0.1.0"
description = "Author and maintain installable skills, plugins, doc-repos, and harnesses for skill-manager; edit unit files, declare deps, write skill-script installers, validate install/bind/sync/instantiate round-trips, and ship edits into the store via commit, push, and sync."
