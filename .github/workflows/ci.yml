name: CI

on:
  push:
    branches: [main]
    # Skip the test-graph matrix when a push only touches files that don't
    # affect tested code (release-please's bookkeeping, brew formula, docs,
    # workflow YAML, server Dockerfile). The release.yml workflow still runs
    # on those pushes; only this CI workflow short-circuits.
    paths-ignore:
      - ".github/workflows/**"
      - "CHANGELOG.md"
      - "version.txt"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "infra/homebrew/**"
      - "infra/homebrew-skill-manager/**"
      - "Dockerfile.server"
      - "docker-compose-ghcr.yml"
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - "CHANGELOG.md"
      - "version.txt"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "infra/homebrew/**"
      - "infra/homebrew-skill-manager/**"
      - "Dockerfile.server"
      - "docker-compose-ghcr.yml"
      - "*.md"
  workflow_dispatch:

# Public pgvector image substituted for the local-registry one used in dev.
# docker-compose.yml reads ${POSTGRES_IMAGE} with a fallback to the local tag.
env:
  POSTGRES_IMAGE: pgvector/pgvector:pg16

jobs:
  unit-tests:
    name: skill-manager unit tests (RunTests.java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JBang
        uses: jbangdev/setup-jbang@main

      # Cache JBang separately from the test-graph job — the unit suite
      # only needs the much smaller dep set declared in RunTests.java
      # (no Spring Boot), so a separate cache key keeps eviction
      # pressure off the heavier graph cache. Restore-keys still falls
      # back to any prior unit-tests cache.
      - name: Cache JBang (unit tests)
        uses: actions/cache@v4
        with:
          path: ~/.jbang
          key: jbang-unit-${{ runner.os }}-${{ hashFiles('RunTests.java') }}
          restore-keys: jbang-unit-${{ runner.os }}-

      - name: Run unit tests
        run: jbang RunTests.java

  gateway-tests:
    name: virtual-mcp-gateway pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: virtual-mcp-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies (with dev extras)
        run: uv sync --all-extras

      - name: Run pytest
        run: uv run --all-extras pytest -v

  spec-validation:
    name: spec validation (TLC + spec-unit + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JBang
        uses: jbangdev/setup-jbang@main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # The spec toolchain is the spec-double-compiler skill (public
      # haydenrear/tla-spec-dev repo; stdlib-only Python) plus tla2tools.jar
      # from the TLA+ GitHub releases. Local dev installs both through
      # skill-manager; CI shims them straight onto PATH so this job doesn't
      # bootstrap a full skill-manager home.
      - name: Cache tla2tools.jar
        uses: actions/cache@v4
        with:
          path: ~/.tla-spec-dev/tla2tools.jar
          key: tla2tools-${{ runner.os }}-latest

      - name: Install spec tooling (tlc2 + tla-spec-dev on PATH)
        run: |
          set -euo pipefail
          TOOL_HOME="$HOME/.tla-spec-dev"
          mkdir -p "$TOOL_HOME/bin"
          rm -rf "$TOOL_HOME/skill"
          git clone --depth 1 https://github.com/haydenrear/tla-spec-dev "$TOOL_HOME/skill"
          if [ ! -f "$TOOL_HOME/tla2tools.jar" ]; then
            curl -fsSL -o "$TOOL_HOME/tla2tools.jar" \
              https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar
          fi
          printf '#!/usr/bin/env bash\nexec java -XX:+UseParallelGC -cp "%s" tlc2.TLC "$@"\n' \
            "$TOOL_HOME/tla2tools.jar" > "$TOOL_HOME/bin/tlc2"
          printf '#!/usr/bin/env bash\nexec python3 "%s" "$@"\n' \
            "$TOOL_HOME/skill/scripts/tla_spec_dev.py" > "$TOOL_HOME/bin/tla-spec-dev"
          chmod +x "$TOOL_HOME/bin/tlc2" "$TOOL_HOME/bin/tla-spec-dev"
          echo "$TOOL_HOME/bin" >> "$GITHUB_PATH"
          echo "SPEC_DOUBLE_COMPILER_HOME=$TOOL_HOME/skill" >> "$GITHUB_ENV"
          "$TOOL_HOME/bin/tlc2" -h >/dev/null 2>&1 || true
          "$TOOL_HOME/bin/tla-spec-dev" --help >/dev/null

      - name: TLC model check (External + Internal slices)
        working-directory: specs/program_model
        run: |
          set -euo pipefail
          bash run_tlc.sh External.tla External.cfg
          for cfg in InternalCliStoreCases InternalGatewayCases \
                     InternalServerRegistryCases InternalProjectCases \
                     InternalCliDisclosureCases; do
            bash run_tlc.sh Internal.tla "$cfg.cfg"
          done

      - name: Regenerate spec case packages
        run: |
          python3 scripts/regenerate_spec_cases.py \
            --spec-dir specs/program_model --out specs/generated --views both

      - name: Spec-unit tests (tla-spec-dev)
        run: tla-spec-dev --spec-root specs run spec-unit-tests --target specs/program_model

      - name: Program-model pytest
        run: uv run --with pytest,pyyaml python3 -m pytest specs/program_model/tests -q

  test-graph:
    name: "test-graph: ${{ matrix.graph }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Keep enough serialization to avoid a cold-cache stampede on Maven
      # Central, but allow two graphs at a time so the matrix is not fully
      # sequential once the first cache restore warms JBang/Gradle.
      max-parallel: 2
      matrix:
        # `hyper-experiments` exercises the install-time env-init path:
        # X_RUNPOD_KEY (provisioned from secrets at the job level below)
        # is mapped to RUNPOD_API_KEY in HyperInstalled before the
        # install subprocess runs, which auto-deploys runpod-mcp and
        # lets the downstream nodes invoke list-gpu-types.
        #
        # `plugin-smoke` covers the plugin layout publish/install path
        # (.claude-plugin/plugin.json detection, contained-skill addressing).
        # `source-tracking` + `git-latest-source-tracking` exercise the
        # sync-from-source flows (local dir, git pin, fast-forward, merge,
        # conflict) — these regressed silently during the policy-gate
        # calibration in ticket 12 and only got caught locally.
        graph:
          - smoke
          - onboard
          - project-manifest
          - project-resolve
          - project-smoke
          - project-env
          - project-libs
          - project-profiles
          - hyper-experiments
          - plugin-smoke
          - doc-smoke
          - harness-smoke
          - skill-dev-smoke
          - source-tracking
          - git-latest-source-tracking
    env:
      # Set on every matrix job — only hyper-experiments actually uses it,
      # but it's harmless for the others (they never read it).
      X_RUNPOD_KEY: ${{ secrets.X_RUNPOD_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JBang
        uses: jbangdev/setup-jbang@main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            test_graph/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('test_graph/**/*.gradle*', 'test_graph/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache JBang
        uses: actions/cache@v4
        with:
          path: ~/.jbang
          key: jbang-${{ runner.os }}-${{ hashFiles('**/*.java') }}
          restore-keys: jbang-${{ runner.os }}-

      # Diagnostic: surface JBang/Maven cache state + Maven Central
      # reachability before any jbang invocation runs. Helps tell apart:
      #   1. cache poisoning (.lastUpdated markers on missing JARs say
      #      "tried recently, do not retry"),
      #   2. network / DNS / proxy failures from the runner,
      #   3. genuine 404s on a published artifact.
      # Runs unconditionally — cheap, and "absent in central" failures
      # land in the next step, so we want this evidence captured first.
      - name: Inspect JBang cache + Maven Central reachability
        run: |
          set +e
          echo "--- jbang version ---"
          jbang version 2>&1 || echo "(jbang not on PATH)"

          echo
          echo "--- ~/.jbang layout ---"
          if [ -d "$HOME/.jbang" ]; then
            du -sh "$HOME/.jbang" 2>/dev/null
            find "$HOME/.jbang" -maxdepth 3 -type d 2>/dev/null | head -30
          else
            echo "(no ~/.jbang — fresh cache)"
          fi

          echo
          echo "--- ~/.m2/repository size + dep counts ---"
          if [ -d "$HOME/.m2/repository" ]; then
            du -sh "$HOME/.m2/repository" 2>/dev/null
            jar_count=$(find "$HOME/.m2/repository" -name '*.jar' 2>/dev/null | wc -l)
            pom_count=$(find "$HOME/.m2/repository" -name '*.pom' 2>/dev/null | wc -l)
            echo "jars=$jar_count poms=$pom_count"
          else
            echo "(no ~/.m2/repository)"
          fi

          echo
          echo "--- failed-resolution markers (Maven .lastUpdated) ---"
          # `.lastUpdated` next to a missing artifact is the proximate
          # signal of poisoning. Print up to 30; redact home path.
          marker_count=$(find "$HOME/.m2" "$HOME/.jbang" -name '*.lastUpdated' 2>/dev/null | wc -l)
          echo "marker_count=$marker_count"
          if [ "$marker_count" -gt 0 ]; then
            find "$HOME/.m2" "$HOME/.jbang" -name '*.lastUpdated' 2>/dev/null \
              | head -30 \
              | sed "s|$HOME|~|g"
            echo
            echo "--- sample marker contents (first 3) ---"
            find "$HOME/.m2" "$HOME/.jbang" -name '*.lastUpdated' 2>/dev/null \
              | head -3 \
              | while read f; do
                  echo "::group::$(echo "$f" | sed "s|$HOME|~|g")"
                  cat "$f" 2>/dev/null
                  echo "::endgroup::"
                done
          fi

          echo
          echo "--- direct reachability of Maven Central ---"
          # Probe a Spring Boot artifact that the registry server depends
          # on. A non-200 here is the smoking gun for "Maven Central is
          # genuinely refusing this runner" rather than cache state.
          curl -sS -o /dev/null -w "spring-boot-starter-web 3.3.4 jar HEAD: %{http_code} (%{time_total}s)\n" \
              -I https://repo1.maven.org/maven2/org/springframework/boot/spring-boot-starter-web/3.3.4/spring-boot-starter-web-3.3.4.jar
          curl -sS -o /dev/null -w "spring-boot-starter-web 3.3.4 pom HEAD: %{http_code} (%{time_total}s)\n" \
              -I https://repo1.maven.org/maven2/org/springframework/boot/spring-boot-starter-web/3.3.4/spring-boot-starter-web-3.3.4.pom
          curl -sS -o /dev/null -w "central root GET:                 %{http_code} (%{time_total}s)\n" \
              https://repo1.maven.org/maven2/

          echo
          echo "--- DNS for repo1.maven.org ---"
          getent hosts repo1.maven.org 2>&1 || echo "(getent failed)"

      - name: Pre-pull postgres image
        run: docker pull "$POSTGRES_IMAGE"

      # GatewayRuntime.pythonExecutable() auto-picks virtual-mcp-gateway/.venv/bin/python
      # when it exists; `uv sync` materializes the venv with fastapi/uvicorn/mcp/etc.
      # Without this step `skill-manager gateway up` spawns bare python3 and the
      # gateway subprocess dies with ModuleNotFoundError before binding its port.
      - name: Install gateway Python deps
        run: uv sync --all-extras
        working-directory: virtual-mcp-gateway

      # plugin-smoke needs the Claude + Codex harness CLIs on PATH so
      # the RefreshHarnessPlugins effect can drive `claude plugin
      # install` / `codex plugin marketplace add` end-to-end. Other
      # graphs don't touch these commands. The CLIs are installed via
      # npm to keep the matrix host-agnostic; if either install fails,
      # plugin-smoke's HelloPluginRegisteredWithHarness node falls
      # back to its "missing-CLI recorded as error" assertion path,
      # which still exercises the contract.
      - name: Install Claude + Codex CLIs (plugin-smoke only)
        if: matrix.graph == 'plugin-smoke'
        run: |
          set -e
          npm install -g @anthropic-ai/claude-code || echo "::warning::claude install failed — plugin-smoke will hit the missing-CLI branch"
          npm install -g @openai/codex || echo "::warning::codex install failed — plugin-smoke will hit the missing-CLI branch"
          echo "claude → $(command -v claude || echo 'not on PATH')"
          echo "codex  → $(command -v codex || echo 'not on PATH')"

      # hyper-experiments asserts a real runpod deploy + tool invoke;
      # without X_RUNPOD_KEY the deploy step fails. Forks don't get
      # repository secrets, so secrets.X_RUNPOD_KEY is empty there and
      # we'd fail every external PR regardless of what changed. Skip
      # the plan + run when the secret isn't available; smoke and
      # sponsored carry the PR.
      - name: Skip hyper-experiments without RunPod secret
        if: matrix.graph == 'hyper-experiments' && env.X_RUNPOD_KEY == ''
        run: |
          echo "::warning::Skipping hyper-experiments graph: secrets.X_RUNPOD_KEY not available (likely a fork PR). Run locally with X_RUNPOD_KEY exported to exercise this graph."

      - name: Plan graph
        if: matrix.graph != 'hyper-experiments' || env.X_RUNPOD_KEY != ''
        run: |
          mkdir -p ci-logs
          set -o pipefail
          python skills/test_graph/scripts/discover.py "${{ matrix.graph }}" --test-graph-root test_graph \
            2>&1 | tee ci-logs/plan.log

      # CiLoggedIn (and several other nodes) use ProcessBuilder.inheritIO(),
      # so their subprocess stderr only reaches Gradle's stdout. Tee the full
      # stream so the real error is recoverable from the uploaded artifact
      # even after the live log scrolls / the run ages out.
      - name: Run graph
        if: matrix.graph != 'hyper-experiments' || env.X_RUNPOD_KEY != ''
        run: |
          mkdir -p ci-logs
          set -o pipefail
          python skills/test_graph/scripts/run.py "${{ matrix.graph }}" --test-graph-root test_graph \
            2>&1 | tee ci-logs/run.log

      - name: Collect diagnostics
        if: always()
        run: bash .github/scripts/collect-test-graph-diagnostics.sh

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.graph }}
          path: ci-diagnostics/
          if-no-files-found: ignore

  # Spec-double external phase: replays every External.tla TLC case against
  # the real CLI inside a branch-scoped k3d cluster provisioned through the
  # deploy-cdc environment repository (environments/skill-manager,
  # templates/branch-preview). Runs entirely on the runner — k3d + OpenTofu,
  # no cloud credentials. Gated like deploy-cdc gates its own
  # computeqSpecExternalPhase: the graph is skipped (with a warning) when the
  # environment repository isn't reachable or doesn't carry the template yet —
  # deploy-cdc is private, so fork PRs (no token) skip here instead of failing,
  # and the job stays green until deploy-cdc PR #7 lands the template on main.
  # No destroy step: the runner (and its k3d cluster) is ephemeral.
  test-graph-spec-external:
    name: "test-graph: specExternalPhase (k3d)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # Overridable so CI can point at a fork/branch of the environment
      # repository before deploy-cdc PR #7 merges; defaults to GitHub main.
      TEST_GRAPH_SM_ENV_SOURCE: ${{ vars.TEST_GRAPH_SM_ENV_SOURCE || 'https://github.com/haydenrear/deploy-cdc' }}
      SKILL_MANAGER_GITHUB_TOKEN: ${{ secrets.SKILL_MANAGER_GITHUB_TOKEN || secrets.GH_PAT || secrets.PERSONAL_ACCESS_TOKEN || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JBang
        uses: jbangdev/setup-jbang@main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            test_graph/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('test_graph/**/*.gradle*', 'test_graph/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache JBang
        uses: actions/cache@v4
        with:
          path: ~/.jbang
          key: jbang-${{ runner.os }}-${{ hashFiles('**/*.java') }}
          restore-keys: jbang-${{ runner.os }}-

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Install k3d
        run: curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Configure git auth for the environment repository
        if: env.SKILL_MANAGER_GITHUB_TOKEN != ''
        run: |
          git config --global url."https://x-access-token:${SKILL_MANAGER_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      # The graph needs environments/skill-manager/templates/branch-preview
      # from the environment repository. Probe instead of failing: fork PRs
      # have no token for the private repo, and the template only exists on
      # main after deploy-cdc PR #7 merges.
      - name: Check environment repository availability
        id: env-repo
        run: |
          set +e
          probe_dir="$(mktemp -d)"
          git clone --depth 1 "$TEST_GRAPH_SM_ENV_SOURCE" "$probe_dir/env-repo" 2>&1 | tail -3
          if [ -d "$probe_dir/env-repo/environments/skill-manager/templates/branch-preview" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping specExternalPhase: environment repository $TEST_GRAPH_SM_ENV_SOURCE is unreachable or does not carry environments/skill-manager/templates/branch-preview (private repo without token, or deploy-cdc PR #7 not merged)."
          fi
          rm -rf "$probe_dir"

      - name: Install gateway Python deps
        if: steps.env-repo.outputs.available == 'true'
        run: uv sync --all-extras
        working-directory: virtual-mcp-gateway

      - name: Plan graph
        if: steps.env-repo.outputs.available == 'true'
        run: |
          mkdir -p ci-logs
          set -o pipefail
          python skills/test_graph/scripts/discover.py specExternalPhase --test-graph-root test_graph \
            2>&1 | tee ci-logs/plan.log

      - name: Run graph
        if: steps.env-repo.outputs.available == 'true'
        run: |
          mkdir -p ci-logs
          set -o pipefail
          python skills/test_graph/scripts/run.py specExternalPhase --test-graph-root test_graph \
            2>&1 | tee ci-logs/run.log

      - name: Collect diagnostics
        if: always()
        run: bash .github/scripts/collect-test-graph-diagnostics.sh

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-specExternalPhase
          path: ci-diagnostics/
          if-no-files-found: ignore

  test-graph-browser:
    # Heavier graphs that boot Selenium + chromedriver. SKILL.md flags these
    # as run-on-demand rather than every commit, so gate on workflow_dispatch.
    if: github.event_name == 'workflow_dispatch'
    name: "test-graph (selenium): ${{ matrix.graph }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        graph: [browser-auth, password-reset, refresh-flow]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JBang
        uses: jbangdev/setup-jbang@main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            test_graph/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('test_graph/**/*.gradle*', 'test_graph/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # - name: Cache JBang
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.jbang
      #     key: jbang-${{ runner.os }}-${{ hashFiles('**/*.java') }}
      #     restore-keys: jbang-${{ runner.os }}-

      - name: Pre-pull postgres image
        run: docker pull "$POSTGRES_IMAGE"

      - name: Install gateway Python deps
        run: uv sync --all-extras
        working-directory: virtual-mcp-gateway

      - name: Plan graph
        run: |
          mkdir -p ci-logs
          set -o pipefail
          python skills/test_graph/scripts/discover.py "${{ matrix.graph }}" --test-graph-root test_graph \
            2>&1 | tee ci-logs/plan.log

      # CiLoggedIn (and several other nodes) use ProcessBuilder.inheritIO(),
      # so their subprocess stderr only reaches Gradle's stdout. Tee the full
      # stream so the real error is recoverable from the uploaded artifact
      # even after the live log scrolls / the run ages out.
      - name: Run graph
        run: |
          mkdir -p ci-logs
          set -o pipefail
          python skills/test_graph/scripts/run.py "${{ matrix.graph }}" --test-graph-root test_graph \
            2>&1 | tee ci-logs/run.log

      - name: Collect diagnostics
        if: always()
        run: bash .github/scripts/collect-test-graph-diagnostics.sh

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.graph }}
          path: ci-diagnostics/
          if-no-files-found: ignore
