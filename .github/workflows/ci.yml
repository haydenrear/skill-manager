name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Public pgvector image substituted for the local-registry one used in dev.
# docker-compose.yml reads ${POSTGRES_IMAGE} with a fallback to the local tag.
env:
  POSTGRES_IMAGE: pgvector/pgvector:pg16

jobs:
  gateway-tests:
    name: virtual-mcp-gateway pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: virtual-mcp-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies (with dev extras)
        run: uv sync --all-extras

      - name: Run pytest
        run: uv run --all-extras pytest -v

  test-graph:
    name: "test-graph: ${{ matrix.graph }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        graph: [smoke, sponsored]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JBang
        uses: jbangdev/setup-jbang@main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            test_graph/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('test_graph/**/*.gradle*', 'test_graph/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache JBang
        uses: actions/cache@v4
        with:
          path: ~/.jbang
          key: jbang-${{ runner.os }}-${{ hashFiles('**/*.java') }}
          restore-keys: jbang-${{ runner.os }}-

      - name: Pre-pull postgres image
        run: docker pull "$POSTGRES_IMAGE"

      - name: Plan graph
        run: python skills/test_graph/scripts/discover.py "${{ matrix.graph }}" --test-graph-root test_graph

      - name: Run graph
        run: python skills/test_graph/scripts/run.py "${{ matrix.graph }}" --test-graph-root test_graph

      - name: Dump postgres logs on failure
        if: failure()
        run: docker compose logs postgres || true

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports-${{ matrix.graph }}
          path: test_graph/build/validation-reports/
          if-no-files-found: ignore

  test-graph-browser:
    # Heavier graphs that boot Selenium + chromedriver. SKILL.md flags these
    # as run-on-demand rather than every commit, so gate on workflow_dispatch.
    if: github.event_name == 'workflow_dispatch'
    name: "test-graph (selenium): ${{ matrix.graph }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        graph: [browser-auth, password-reset, refresh-flow]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install JBang
        uses: jbangdev/setup-jbang@main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            test_graph/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('test_graph/**/*.gradle*', 'test_graph/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache JBang
        uses: actions/cache@v4
        with:
          path: ~/.jbang
          key: jbang-${{ runner.os }}-${{ hashFiles('**/*.java') }}
          restore-keys: jbang-${{ runner.os }}-

      - name: Pre-pull postgres image
        run: docker pull "$POSTGRES_IMAGE"

      - name: Plan graph
        run: python skills/test_graph/scripts/discover.py "${{ matrix.graph }}" --test-graph-root test_graph

      - name: Run graph
        run: python skills/test_graph/scripts/run.py "${{ matrix.graph }}" --test-graph-root test_graph

      - name: Dump postgres logs on failure
        if: failure()
        run: docker compose logs postgres || true

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports-${{ matrix.graph }}
          path: test_graph/build/validation-reports/
          if-no-files-found: ignore
