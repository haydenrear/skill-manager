name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please (open/merge release PR)
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  detect-changes:
    name: Detect which artifact sources changed since previous release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      cli_changed: ${{ steps.diff.outputs.cli_changed }}
      server_changed: ${{ steps.diff.outputs.server_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - id: diff
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          # Previous tag = most recent tag reachable from the parent of the
          # release commit. First-ever release has no parent tag, in which
          # case we run all artifact jobs.
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -z "${PREV_TAG}" ]; then
            echo "No previous tag — first release; building all artifacts."
            echo "cli_changed=true" >> "$GITHUB_OUTPUT"
            echo "server_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing ${PREV_TAG}..${TAG}"
          # release-please bumps `VERSION = "x.y.z"` (Java) and
          # `version = "x.y.z"` (TOML) in step with every release. Without
          # filtering, the regexes below would trip for every release and
          # rebuild artifacts whose real source didn't change.
          #
          # `git diff -I<regex>` filters such hunks at the patch level —
          # but `git diff --name-only -I<regex>` does NOT honor `-I` (the
          # name-only path operates pre-patch and reports any tree diff).
          # So we list candidates with --name-only, then re-check each one
          # with `--quiet -I` (which DOES honor the filter) and drop files
          # whose only remaining diff is a version-string bump. Keep the
          # patterns in sync with release-please-config.json's `extra-files`.
          CHANGED="$(git diff --no-ext-diff --name-only "${PREV_TAG}" "${TAG}" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            if git diff --no-ext-diff --quiet \
                 -I'VERSION = "' \
                 -I'^version = "' \
                 "${PREV_TAG}" "${TAG}" -- "$f"; then
              printf '  ignored (version-only bump): %s\n' "$f" >&2
              continue
            fi
            printf '%s\n' "$f"
          done)"
          echo "Changed files (excluding release-please version-only bumps):"
          printf '%s\n' "${CHANGED}"

          # CLI tarball sources: launcher script, JBang entry, java sources, gateway tree.
          if printf '%s\n' "${CHANGED}" | grep -E '^(SkillManager\.java|skill-manager|src/main/|virtual-mcp-gateway/)' >/dev/null; then
            cli_changed=true
          else
            cli_changed=false
          fi
          # Pushing the multi-arch server image is heavy; only rebuild when
          # the launcher, JBang server entry, server-java tree, or the
          # CLI-side `shared/` package (DTOs + Archives/Fs the server
          # JBang fatjar pulls in via //SOURCES) changed. Anything else
          # under src/main/ is CLI-only.
          if printf '%s\n' "${CHANGED}" | grep -E '^(SkillManagerServer\.java|skill-manager-server|server-java/|src/main/java/dev/skillmanager/shared/)' >/dev/null; then
            server_changed=true
          else
            server_changed=false
          fi
          echo "cli_changed=${cli_changed}" >> "$GITHUB_OUTPUT"
          echo "server_changed=${server_changed}" >> "$GITHUB_OUTPUT"
          echo "cli_changed=${cli_changed} server_changed=${server_changed}"

  publish-cli:
    name: Build CLI tarball + attach to release
    needs: [release-please, detect-changes]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.detect-changes.outputs.cli_changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: jbangdev/setup-jbang@main

      # Server fatjar is intentionally not built here — the server ships
      # via the GHCR container image (see publish-server-image job). Brew
      # users who want to run the server use `docker compose -f
      # docker-compose-ghcr.yml up`.
      - name: Build CLI fatjar
        run: |
          mkdir -p dist/lib dist/bin dist/share
          jbang export fatjar --force -O dist/lib/skill-manager.jar SkillManager.java

      - name: Assemble tarball
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          STAGE="skill-manager-${VERSION}"
          mkdir -p "${STAGE}/bin" "${STAGE}/lib" "${STAGE}/share"

          # Brew-installable launcher — calls java -jar directly, no jbang at runtime.
          # Resolves through symlinks so HOMEBREW_PREFIX/bin/skill-manager → libexec/bin/skill-manager works.
          cat > "${STAGE}/bin/skill-manager" <<'EOS'
          #!/usr/bin/env bash
          set -e
          SRC="${BASH_SOURCE[0]}"
          while [ -L "$SRC" ]; do
            TGT="$(readlink "$SRC")"
            case "$TGT" in /*) SRC="$TGT" ;; *) SRC="$(dirname "$SRC")/$TGT" ;; esac
          done
          DIR="$(cd "$(dirname "$SRC")/.." && pwd)"
          export SKILL_MANAGER_INSTALL_DIR="$DIR/share"
          exec java -jar "$DIR/lib/skill-manager.jar" "$@"
          EOS

          chmod +x "${STAGE}/bin/skill-manager"

          cp dist/lib/skill-manager.jar "${STAGE}/lib/"

          # Ship the gateway source tree (uv-managed). Users get uv via
          # `depends_on "uv"` in the brew formula and `uv sync` runs lazily
          # the first time `skill-manager gateway up` is invoked.
          rsync -a --exclude='.venv' --exclude='__pycache__' --exclude='.pytest_cache' \
              virtual-mcp-gateway "${STAGE}/share/"

          [ -f README.md ] && cp README.md "${STAGE}/"
          [ -f LICENSE ] && cp LICENSE "${STAGE}/" || true

          tar czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" | tee "${STAGE}.tar.gz.sha256"

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          gh release upload "${TAG}" \
            "skill-manager-${VERSION}.tar.gz" \
            "skill-manager-${VERSION}.tar.gz.sha256" \
            --clobber

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: skill-manager-${{ needs.release-please.outputs.version }}.tar.gz

  publish-server-image:
    name: Build server container + push to GHCR
    needs: [release-please, detect-changes]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.detect-changes.outputs.server_changed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      # QEMU enables linux/arm64 cross-builds on the amd64 GitHub-hosted runner.
      # Without this the build-push step skips arm64 silently.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/skill-manager-server
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=v${{ needs.release-please.outputs.version }}
            type=raw,value=latest
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.version }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/skill-manager-server
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  bump-homebrew-tap:
    name: Bump skill-manager/homebrew-tap formula
    needs: [release-please, publish-cli]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: skill-manager
          formula-path: Formula/skill-manager.rb
          homebrew-tap: haydenrear/homebrew-skill-manager
          base-branch: main
          # Action runs on push-to-main, not a tag push. Without an explicit
          # tag-name it falls back to GITHUB_REF and throws
          # `invalid ref: refs/heads/main`.
          tag-name: ${{ needs.release-please.outputs.tag_name }}
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ needs.release-please.outputs.tag_name }}/skill-manager-${{ needs.release-please.outputs.version }}.tar.gz
          commit-message: |
            skill-manager ${{ needs.release-please.outputs.version }}

            Released by ${{ github.repository }} @ ${{ needs.release-please.outputs.tag_name }}
        env:
          # Auto-injected workflow token — used by the action's same-repo
          # client (reads our release tag + asset). main.ts line 45 picks
          # GITHUB_TOKEN first; without it the action falls back to
          # COMMITTER_TOKEN and 401s on the source repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with Contents+PullRequests write on the tap
          # repo — used by the cross-repo client to push the formula
          # branch and open the bump PR.
          COMMITTER_TOKEN: ${{ secrets.SKILL_MANAGER_HOMEBREW_TAP_BUMPER }}
