name: Lint PR release metadata

# Enforce Conventional Commit format on PR titles and make rebase-merge
# release behavior explicit. release-please reads commit messages on main;
# with rebase-merge, that means the branch commit subjects, not the PR title.
# If a PR title asks for a release but every branch commit is non-releasable,
# release-please will silently skip the release PR.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            chore
            refactor
            test
            style
            ci
            build
            revert
          requireScope: false
          # Keep this aligned with the action's conventional-commit parser,
          # but allow an empty subject to parse so subjectPatternError can
          # explain the real problem when a title has `: ` but no subject.
          headerPattern: '^(\w*)(?:\(([\w$.\-*/ ]*)\))?(!)?: (.*)$'
          headerPatternCorrespondence: type, scope, breaking, subject
          subjectPattern: ^[A-Za-z].+$
          subjectPatternError: |
            The subject (text after the type prefix) should start with a letter and not be empty.
            Examples:
              feat: add brew tap publishing
              fix(gateway): handle missing uv binary
              chore!: drop Java 17 support

  lint-rebase-release-signal:
    name: Lint release signal for rebase merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;

            const headerRe = /^(\w+)(?:\(([\w$.\-*/ ]*)\))?(!)?: .+/;
            const titleMatch = title.match(headerRe);
            const releaseTypes = new Set(['feat', 'fix']);
            const titleRequestsRelease =
              Boolean(titleMatch) &&
              (releaseTypes.has(titleMatch[1]) || titleMatch[3] === '!');

            if (!titleRequestsRelease) {
              core.info('PR title is conventional but does not request a release.');
              return;
            }

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const releaseCommitRe = /^(feat|fix)(?:\([\w$.\-*/ ]*\))?!?: .+/;
            const breakingCommitRe = /^\w+(?:\([\w$.\-*/ ]*\))?!: .+/;
            const subjects = commits.map((commit) => commit.commit.message.split('\n')[0]);
            const releasableSubjects = subjects.filter((subject) =>
              releaseCommitRe.test(subject) || breakingCommitRe.test(subject)
            );

            if (releasableSubjects.length === 0) {
              const listedSubjects = subjects.map((subject) => `  - ${subject}`).join('\n');
              core.setFailed(
                [
                  'This PR title asks for a release, but none of the branch commit subjects are releasable Conventional Commits.',
                  'Rebase-merge preserves branch commit subjects, so release-please will ignore the PR title after merge.',
                  'Amend at least one branch commit subject to `feat: ...`, `feat(scope): ...`, `fix: ...`, or `fix(scope): ...` before rebase-merge.',
                  '',
                  'Branch commit subjects:',
                  listedSubjects,
                ].join('\n')
              );
              return;
            }

            core.info(`Found releasable commit subject: ${releasableSubjects[0]}`);
