# Match the Python-origin snake_case JSON contract.
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

server.error.include-message=always

# --- Datasource ----------------------------------------------------------
# Points at the Postgres-pgvector instance brought up by docker-compose.yml.
# Override the URL with SKILL_REGISTRY_DB_URL to steer a run at an alternate
# database (the test_graph sets it to skill_registry_test to keep its
# TRUNCATEs isolated from local dev data).
spring.datasource.url=${SKILL_REGISTRY_DB_URL:jdbc:postgresql://localhost:5432/skill_registry}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SKILL_REGISTRY_DB_USER:postgres}
spring.datasource.password=${SKILL_REGISTRY_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- Auth server ---------------------------------------------------------
# PKCS#12 keystore password (RSA signing keypair for JWTs). Generated on
# first boot at ${SKILL_REGISTRY_ROOT}/jwt-keystore.p12 — rotate by deleting
# that file and restarting, or by swapping the password and re-importing.
skill-registry.keystore.password=${SKILL_REGISTRY_KEYSTORE_PASSWORD:changeit}
# Client-credentials secret for the ci client used by the test graph.
skill-registry.client.ci.secret=${SKILL_REGISTRY_CI_SECRET:dev-ci-secret-change-me}
