# Match the Python-origin snake_case JSON contract.
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB

server.error.include-message=always

# --- Publish backend -----------------------------------------------------
# Default is github-pointer publishes only (POST /skills/register). The
# legacy multipart upload (POST /skills/{name}/{version}) is gated behind
# this flag — flip to true to re-enable for private/object-store backends.
skill-registry.publish.allow-file-upload=${SKILL_REGISTRY_ALLOW_FILE_UPLOAD:false}

# --- Datasource ----------------------------------------------------------
# Points at the Postgres-pgvector instance brought up by docker-compose.yml.
# Override the URL with SKILL_REGISTRY_DB_URL to steer a run at an alternate
# database (the test_graph sets it to skill_registry_test to keep its
# TRUNCATEs isolated from local dev data).
spring.datasource.url=${SKILL_REGISTRY_DB_URL:jdbc:postgresql://localhost:5432/skill_registry}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SKILL_REGISTRY_DB_USER:postgres}
spring.datasource.password=${SKILL_REGISTRY_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- Auth server ---------------------------------------------------------
# PKCS#12 keystore password (RSA signing keypair for JWTs). Generated on
# first boot at ${SKILL_REGISTRY_ROOT}/jwt-keystore.p12 — rotate by deleting
# that file and restarting, or by swapping the password and re-importing.
skill-registry.keystore.password=${SKILL_REGISTRY_KEYSTORE_PASSWORD:changeit}
# Client-credentials secret for the ci client used by the test graph.
skill-registry.client.ci.secret=${SKILL_REGISTRY_CI_SECRET:dev-ci-secret-change-me}

# --- Mail -----------------------------------------------------------------
# Gmail SMTP. CLOUD_COM_LLC_PASSWORD must be an App Password (not the
# account's regular password) because Gmail blocks password-grant SMTP.
# Leave the env var unset during local dev; MailService degrades to a
# log-only send so flows keep working.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SKILL_REGISTRY_MAIL_USERNAME:cloudcomllc@gmail.com}
spring.mail.password=${CLOUD_COM_LLC_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
skill-registry.mail.from=${SKILL_REGISTRY_MAIL_FROM:cloudcomllc@gmail.com}

# --- Token lifetimes ------------------------------------------------------
# 1 hour access + 7 day refresh is the default. refresh-flow test graph
# dials access to a few seconds to exercise the real-expiry refresh path.
skill-registry.access-token-ttl-seconds=${SKILL_REGISTRY_ACCESS_TOKEN_TTL_SECONDS:3600}
skill-registry.refresh-token-ttl-seconds=${SKILL_REGISTRY_REFRESH_TOKEN_TTL_SECONDS:604800}
# Clock skew Spring accepts when validating a JWT's exp claim. The OAuth2
# default is 60s, which hides 3-second-TTL tests; drop to zero in CI to
# prove token expiry is honored tightly.
skill-registry.jwt.clock-skew-seconds=${SKILL_REGISTRY_JWT_CLOCK_SKEW_SECONDS:60}
