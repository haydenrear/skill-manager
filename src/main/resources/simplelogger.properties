# SLF4J Simple logger defaults for the skill-manager CLI. Command output goes
# to stdout; we keep stderr logs to WARN so CLI output stays clean by default.
# Override with -Dorg.slf4j.simpleLogger.defaultLogLevel=debug for full trace.
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.levelInBrackets=true
# SDK startup line is noisy on every one-shot CLI invocation; hush it.
org.slf4j.simpleLogger.log.io.modelcontextprotocol.client.LifecycleInitializer=warn
